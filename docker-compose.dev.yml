# Docker Compose - 本地開發環境 (使用 Air 進行熱重載)
# 使用方式: docker-compose -f docker-compose.dev.yml up

services:
  # 聊天應用後端服務
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        VERSION: ${VERSION:-1.0.0}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    container_name: chat_app_backend_dev
    user: root
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-80}:${SERVER_PORT:-80}"
    env_file:
      - .env.development
    environment:
      DOCKER_ENV: "true"
      ENV: ${ENV:-development}
      GIN_MODE: ${GIN_MODE:-debug}
      # Go Runtime 效能調校參數
      GOMEMLIMIT: ${GOMEMLIMIT:-900MiB}
      GOMAXPROCS: ${GOMAXPROCS:-2}
      # 讓 Go 使用標準的容器內路徑，並透過 volume 持久化
      GOCACHE: /go/cache
      GOMODCACHE: /go/pkg/mod
    volumes:
      # 開發模式：掛載整個專案目錄（實現熱重載）
      - .:/app:delegated
      # 使用專用 Volume 儲存模組與編譯結果，這能大幅提升 air rebuild 速度
      - go-modules:/go/pkg/mod
      - go-build-cache:/go/cache
      # 靜態檔案
      - ./uploads:/app/uploads
    networks:
      - chat-network
      - mongodb_default
      - redis_default
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider --quiet http://localhost:${SERVER_PORT:-80}/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  go-modules:
    driver: local
  go-build-cache:
    driver: local

networks:
  chat-network:
    driver: bridge
  mongodb_default:
    external: true
  redis_default:
    external: true
