# ConfigMap - Chat Backend 本地開發配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-backend-config
  namespace: chat-app
data:
  # Go / Gin 設定
  GIN_MODE: "debug"
  ENV: "development"
  SERVER_PORT: "80"
  SERVER_MAIN_DOMAIN: "localhost"
  SERVER_BASE_URL: "http://localhost"
  TIMEZONE: "Asia/Taipei"
  ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
  TRUSTED_PROXIES: "127.0.0.1,::1,172.16.0.0/12,10.0.0.0/8,192.168.0.0/16"

  # Token 設定
  JWT_ACCESS_EXPIRE_HOURS: "24"
  JWT_REFRESH_EXPIRE_HOURS: "168"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_HOURS: "72"

  # MongoDB 連線 (指向本機主機)
  # OrbStack 預設使用 host.orb.internal 存取 Mac 本機服務
  MONGO_URI: "host.orb.internal:27017"
  MONGO_DB_NAME: "chat_app"
  MONGO_AUTH_SOURCE: "admin"

  # Redis 連線 (指向本機主機)
  REDIS_ADDR: "host.orb.internal:6379"
  REDIS_DB: "0"

  # 檔案上傳
  UPLOAD_MAX_SIZE: "10485760"
  UPLOAD_ALLOWED_TYPES: "image/jpeg,image/png,image/gif"

  # Minio / S3 (本地預設為空)
  MINIO_BUCKET_NAME: "chat-app"
  MINIO_PUBLIC_URL: ""
  MINIO_USE_SSL: "false"

  # Go Runtime 效能調校
  GOMEMLIMIT: "460MiB"
  GOMAXPROCS: "1"

  # 健康檢查
  HEALTH_CHECK_URL: "http://localhost:80/health"
