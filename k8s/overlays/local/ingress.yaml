# Ingress for Chat Backend (Local - Traefik)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-backend
  namespace: chat-app
  annotations:
    # Traefik 專用註解
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # 支援 WebSocket 的 Sticky Session
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "CHAT_AFFINITY"
spec:
  ingressClassName: traefik
  rules:
    - host: chat.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chat-backend
                port:
                  number: 80
    # 支援直接使用 localhost (無 host) 訪問
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chat-backend
                port:
                  number: 80
