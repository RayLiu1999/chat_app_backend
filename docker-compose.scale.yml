# Docker Compose - 水平擴展測試環境 (基於生產環境標準)
# 使用方式: docker-compose -f docker-compose.scale.yml up -d --scale app=3

services:
  # nginx 負載均衡器
  nginx:
    image: nginx:alpine
    container_name: chat_nginx_lb
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.scale.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 聊天應用後端服務 - 可擴展
  # 注意：移除了 container_name 以支援 --scale
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod # 使用與生產環境相同的建構階段
      args:
        VERSION: ${VERSION:-1.0.0}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    restart: unless-stopped
    # 不暴露固定端口，由 nginx 負載均衡
    expose:
      - "${SERVER_PORT:-80}"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DOCKER_ENV: "true"
      ENV: ${ENV:-production}
      GIN_MODE: release
      # 用於識別不同實例
      INSTANCE_ID: "${HOSTNAME:-unknown}"
      # Go Runtime 效能調校參數 (同步生產環境)
      GOMEMLIMIT: ${GOMEMLIMIT:-900MiB}
      GOMAXPROCS: ${GOMAXPROCS:-2}
    volumes:
      # 去除開發環境掛載，僅保留上傳目錄
      - ./uploads:/app/uploads
    networks:
      - chat-network
      - mongodb_default
      - redis_default
      - prometheus-grafana_default
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider --quiet http://localhost:${SERVER_PORT:-80}/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: ${CPU_LIMIT:-2}
          memory: ${MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${CPU_RESERVATION:-0.5}
          memory: ${MEMORY_RESERVATION:-512M}

networks:
  chat-network:
    driver: bridge
  mongodb_default:
    external: true
  redis_default:
    external: true
  prometheus-grafana_default:
    external: true
