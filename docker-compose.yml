# Docker Compose - 統一開發與測試環境
# 使用方式:
#   開發: docker-compose up
#   壓測: docker-compose --profile test up

services:
  # 聊天應用後端服務
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-dev} # 預設使用 dev stage，壓測時設為 prod
      args:
        VERSION: ${VERSION:-1.0.0}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    container_name: chat_app_backend
    user: root
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-80}:${SERVER_PORT:-80}"
    env_file:
      - ${ENV_FILE:-.env.development}
    environment:
      DOCKER_ENV: "true"
      ENV: ${ENV:-development}
      GIN_MODE: ${GIN_MODE:-debug}
      # Go Runtime 效能調校參數
      GOMEMLIMIT: ${GOMEMLIMIT:-900MiB}
      GOMAXPROCS: ${GOMAXPROCS:-2}
      # 讓 Go 使用標準的容器內路徑，並透過 volume 持久化
      GOCACHE: /go/cache
      GOMODCACHE: /go/pkg/mod
    volumes:
      # 開發模式：掛載整個專案目錄（實現熱重載）
      - .:/app:delegated
      # 使用專用 Volume 儲存模組與編譯結果，這能大幅提升 air rebuild 速度
      - go-modules:/go/pkg/mod
      - go-build-cache:/go/cache
      # 靜態檔案
      - ./uploads:/app/uploads
    networks:
      - chat-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider --quiet http://localhost:${SERVER_PORT:-80}/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: ${CPU_LIMIT:-2}
          memory: ${MEMORY_LIMIT:-1G}
        reservations:
          cpus: ${CPU_RESERVATION:-0.5}
          memory: ${MEMORY_RESERVATION:-512M}

volumes:
  go-modules:
    driver: local
  go-build-cache:
    driver: local

networks:
  chat-network:
    driver: bridge
